baseURL: "https://vi-dev.org/"
title: vi-dev
copyright: "© vi-dev.org 2026"

enableInlineShortcodes: true
enableRobotsTXT: true
enableGitInfo: true

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    parser:
      autoHeadingIDType: github

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: nem
      url: "/nem/"
      weight: 1
    - name: GitHub
      weight: 2
      url: "https://github.com/vi-dev"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/videv-mark-ink.svg
      dark: images/videv-mark.svg
      width: 24
      height: 24
  theme:
    default: system
    displayToggle: true
  footer:
    enable: true
    displayCopyright: true
